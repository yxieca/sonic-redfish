[pytest]
# Resolves testpaths relative to pytest.ini directory, allowing tests/redfish-api/data to be imported as a package.
testpaths = tests/redfish-api
pythonpath = tests/redfish-api
python_files = test_*.py
python_classes = Test*
python_functions = test_*
